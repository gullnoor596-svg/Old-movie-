<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>𝗚𝗨𝗟𝗟 𝗞𝗛𝗔𝗡 𝗪𝗘𝗕 𝗦𝗘𝗥𝗩𝗘𝗥</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root {
    --bg-color: #111;
    --text-color: #fff;
    --card-bg: rgba(255,255,255,0.05);
    --highlight-color: #00ff88;
    --search-bg: #222;
    --download-hd: linear-gradient(90deg,#00ff88,#00cc55);
    --download-sd: linear-gradient(90deg,#00ccff,#0066ff);
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
html, body {
    margin:0;
    padding:0;
    font-family:'Segoe UI',sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
    overflow-x:hidden;
    transition: background 0.7s ease, color 0.7s ease;
    min-height: 100vh;
}

/* ─── TOP BAR WITH ICONS ─── */
.top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 25px 45px;
    background: transparent;
    position: sticky;
    top: 0;
    z-index: 999;
    transition: background 0.7s ease;
}

/* ─── INFO ICON WITH ANIMATION ─── */
.info-icon {
    font-size: 70px;
    color: var(--highlight-color);
    cursor: pointer;
    transition: transform 0.3s ease, color 0.3s;
    width: 110px;
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    background: transparent !important;
    border: none !important;
    outline: none !important;
    box-shadow: none !important;
    position: relative;
}

/* Info icon pulse animation */
.info-icon .fa-info-circle {
    animation: infoPulse 2.5s ease-in-out infinite;
    transition: all 0.3s ease;
}

@keyframes infoPulse {
    0% { 
        transform: scale(1); 
        filter: drop-shadow(0 0 10px rgba(0,255,136,0.3));
    }
    50% { 
        transform: scale(1.08); 
        filter: drop-shadow(0 0 40px rgba(0,255,136,0.6));
    }
    100% { 
        transform: scale(1); 
        filter: drop-shadow(0 0 10px rgba(0,255,136,0.3));
    }
}

/* Info icon ring animation */
.info-icon::before {
    content: '';
    position: absolute;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid rgba(0,255,136,0.15);
    animation: infoRing 3s ease-in-out infinite;
}

@keyframes infoRing {
    0% { 
        transform: scale(0.8); 
        opacity: 0.8;
    }
    50% { 
        transform: scale(1.2); 
        opacity: 0;
    }
    100% { 
        transform: scale(0.8); 
        opacity: 0.8;
    }
}

/* Second ring with delay */
.info-icon::after {
    content: '';
    position: absolute;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid rgba(0,255,136,0.1);
    animation: infoRing2 3s ease-in-out infinite 1.5s;
}

@keyframes infoRing2 {
    0% { 
        transform: scale(0.8); 
        opacity: 0.8;
    }
    50% { 
        transform: scale(1.3); 
        opacity: 0;
    }
    100% { 
        transform: scale(0.8); 
        opacity: 0.8;
    }
}

.info-icon:hover {
    transform: scale(1.15) rotate(-10deg);
    color: #fff;
}
.info-icon:hover .fa-info-circle {
    animation: none;
    filter: drop-shadow(0 0 60px rgba(0,255,136,0.8));
}
.info-icon:hover::before,
.info-icon:hover::after {
    animation: none;
    opacity: 0;
}

/* ─── THEME TOGGLE - NO BLACK CIRCLE ─── */
.theme-toggle {
    font-size: 70px;
    cursor: pointer;
    user-select: none;
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent !important;
    border: none !important;
    outline: none !important;
    position: relative;
    box-shadow: none !important;
}

.theme-toggle .icon-wrapper {
    position: relative;
    width: 90px;
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent !important;
}

/* ─── MOON WITH STARS ─── */
.theme-toggle .icon-wrapper .moon-container {
    position: absolute;
    transition: all 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    background: transparent !important;
}

.theme-toggle .icon-wrapper .moon-container .fa-moon {
    font-size: 75px;
    color: #f0e68c;
    filter: drop-shadow(0 0 30px rgba(240, 230, 140, 0.3));
    transition: all 0.7s ease;
    background: transparent !important;
}

/* Stars around moon */
.theme-toggle .icon-wrapper .moon-container .star {
    position: absolute;
    color: #fff;
    font-size: 12px;
    opacity: 0.8;
    animation: twinkle 2s ease-in-out infinite alternate;
    background: transparent !important;
}

.theme-toggle .icon-wrapper .moon-container .star:nth-child(2) {
    top: -15px;
    right: -20px;
    font-size: 10px;
    animation-delay: 0.5s;
}
.theme-toggle .icon-wrapper .moon-container .star:nth-child(3) {
    bottom: -10px;
    left: -25px;
    font-size: 14px;
    animation-delay: 1s;
}
.theme-toggle .icon-wrapper .moon-container .star:nth-child(4) {
    top: 5px;
    left: -30px;
    font-size: 8px;
    animation-delay: 0.3s;
}
.theme-toggle .icon-wrapper .moon-container .star:nth-child(5) {
    bottom: 15px;
    right: -25px;
    font-size: 11px;
    animation-delay: 0.8s;
}

@keyframes twinkle {
    0% { opacity: 0.3; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1.2); }
}

/* ─── SUN WITH LIGHT RAYS ─── */
.theme-toggle .icon-wrapper .sun-container {
    position: absolute;
    transition: all 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    background: transparent !important;
}

.theme-toggle .icon-wrapper .sun-container .fa-sun {
    font-size: 75px;
    color: #ffd700;
    filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.4));
    transition: all 0.7s ease;
    background: transparent !important;
}

/* Pure CSS Light Rays */
.theme-toggle .icon-wrapper .sun-container .ray {
    position: absolute;
    width: 4px;
    height: 22px;
    background: linear-gradient(180deg, #ffd700, transparent);
    border-radius: 2px;
    opacity: 0.7;
    animation: rayPulse 1.5s ease-in-out infinite alternate;
    transform-origin: center center;
}

.theme-toggle .icon-wrapper .sun-container .ray:nth-child(2) { 
    transform: rotate(0deg) translateY(-18px); 
    animation-delay: 0s; 
}
.theme-toggle .icon-wrapper .sun-container .ray:nth-child(3) { 
    transform: rotate(45deg) translateY(-18px); 
    animation-delay: 0.15s; 
}
.theme-toggle .icon-wrapper .sun-container .ray:nth-child(4) { 
    transform: rotate(90deg) translateY(-18px); 
    animation-delay: 0.3s; 
}
.theme-toggle .icon-wrapper .sun-container .ray:nth-child(5) { 
    transform: rotate(135deg) translateY(-18px); 
    animation-delay: 0.45s; 
}
.theme-toggle .icon-wrapper .sun-container .ray:nth-child(6) { 
    transform: rotate(180deg) translateY(-18px); 
    animation-delay: 0.6s; 
}
.theme-toggle .icon-wrapper .sun-container .ray:nth-child(7) { 
    transform: rotate(225deg) translateY(-18px); 
    animation-delay: 0.75s; 
}
.theme-toggle .icon-wrapper .sun-container .ray:nth-child(8) { 
    transform: rotate(270deg) translateY(-18px); 
    animation-delay: 0.9s; 
}
.theme-toggle .icon-wrapper .sun-container .ray:nth-child(9) { 
    transform: rotate(315deg) translateY(-18px); 
    animation-delay: 1.05s; 
}

@keyframes rayPulse {
    0% { 
        opacity: 0.3; 
        transform: rotate(var(--rot)) translateY(-12px) scale(0.8); 
        height: 18px;
    }
    100% { 
        opacity: 0.9; 
        transform: rotate(var(--rot)) translateY(-24px) scale(1.2); 
        height: 26px;
    }
}

/* ─── DEFAULT STATE - MOON VISIBLE ─── */
.theme-toggle .icon-wrapper .moon-container {
    opacity: 1;
    transform: rotate(0deg) scale(1);
}

.theme-toggle .icon-wrapper .sun-container {
    opacity: 0;
    transform: rotate(-180deg) scale(0.3);
}

/* ─── LIGHT STATE - SUN VISIBLE ─── */
body.light .theme-toggle .icon-wrapper .moon-container {
    opacity: 0;
    transform: rotate(180deg) scale(0.3);
}

body.light .theme-toggle .icon-wrapper .sun-container {
    opacity: 1;
    transform: rotate(0deg) scale(1);
}

/* Hover effect - NO BACKGROUND */
.theme-toggle:hover {
    transform: scale(1.08);
    background: transparent !important;
}

/* ─── SPARKLE ANIMATION ─── */
@keyframes sparkle {
    0% { transform: scale(0) rotate(0deg); opacity: 1; }
    100% { transform: scale(2.5) rotate(180deg); opacity: 0; }
}
.sparkle {
    position: fixed;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    pointer-events: none;
    animation: sparkle 0.8s ease-out forwards;
    z-index: 999999;
    background: transparent !important;
}

/* LIGHT THEME OVERRIDES - NO BLACK CIRCLE */
body.light {
    --bg-color: #f2f2f2;
    --text-color: #1a1a1a;
    --card-bg: rgba(0,0,0,0.07);
    --search-bg: #e0e0e0;
    --highlight-color: #007744;
    --download-hd: linear-gradient(90deg,#00bb66,#009944);
    --download-sd: linear-gradient(90deg,#0099dd,#0044bb);
}
body.light .info-icon {
    color: var(--highlight-color);
    background: transparent !important;
}
body.light .info-icon:hover {
    color: #005533;
}
body.light .theme-toggle {
    background: transparent !important;
    border: none !important;
    box-shadow: none !important;
}
body.light .theme-toggle .icon-wrapper {
    background: transparent !important;
}
body.light .theme-toggle .icon-wrapper .moon-container {
    background: transparent !important;
}
body.light .theme-toggle .icon-wrapper .sun-container {
    background: transparent !important;
}
body.light .theme-toggle .icon-wrapper .sun-container .fa-sun {
    background: transparent !important;
}
body.light .theme-toggle .icon-wrapper .moon-container .fa-moon {
    background: transparent !important;
}
body.light .theme-toggle .icon-wrapper .moon-container .star {
    background: transparent !important;
}
body.light .theme-toggle .icon-wrapper .sun-container .ray {
    background: linear-gradient(180deg, #ffd700, transparent) !important;
}

/* ─── YOUR EXISTING STYLES ─── */
.search-container{
    text-align:center;
    margin:20px 0;
}

.search-container input{
    width:90%;
    max-width:850px;
    padding:30px;
    font-size:40px;
    border-radius:15px;
    border:none;
    background:var(--search-bg);
    color:var(--text-color);
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
    padding:20px 20px;
}
.movie{
    background: var(--card-bg);
    border-radius:15px;
    overflow:hidden;
    text-align:center;
    transition:0.7s;
    position:relative;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}
.movie img{
    width:100%;
    height:450px;
    object-fit:cover;
}
.movie h3 {
    font-size:30px;
    font-weight:bold;
    color: var(--highlight-color);
    margin:12px 0;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}
.movie.active-touch::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,rgba(255,255,255,0.8),transparent);
    animation:slide 0.5s;
    border-radius:15px;
}
@keyframes slide{from{left:-100%}to{left:100%}}
.download {
    display: block;
    margin: 8px auto 15px auto;
    padding: 10px 45px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: bold;
    font-size: 25px;
    text-align:center;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.7s ease, background 0.7s ease, color 0.7s ease;
    color:#fff;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.download.hd {background: var(--download-hd);}
.download.sd {background: var(--download-sd);}
.download:active{transform:scale(0.95);}
.ripple{
    position:absolute;
    border-radius:50%;
    transform:scale(0);
    animation:ripple-effect 0.6s linear forwards;
    pointer-events:none;
    opacity:0.5;
}
@keyframes ripple-effect{to{transform:scale(6);opacity:0;}}
.fadeIn{opacity:0;transform:translateY(20px);animation:fadeUp 0.6s forwards;}
@keyframes fadeUp{to{opacity:1;transform:translateY(0);}}

/* ─── TITLE FONT HEIGHT AND WEIGHT ADJUSTED ─── */
.rainbow-text {
    display: inline-block;
    background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #1dd1a1, #5f27cd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 900;
    line-height: 1.3;
    letter-spacing: 2px;
}
h1 {
    text-align: center;
    font-size: clamp(2.5rem, 8vw, 10.5rem);
    margin: 5px 0 10px 0;
}

@media (max-width: 768px) {
    .top-bar { padding: 18px 22px; }
    .info-icon { width: 85px; height: 85px; font-size: 52px; }
    .info-icon::before { width: 95px; height: 95px; }
    .info-icon::after { width: 95px; height: 95px; }
    .theme-toggle { width: 95px; height: 95px; }
    .theme-toggle .icon-wrapper { width: 65px; height: 65px; }
    .theme-toggle .icon-wrapper .moon-container .fa-moon { font-size: 52px; }
    .theme-toggle .icon-wrapper .sun-container .fa-sun { font-size: 52px; }
    .theme-toggle .icon-wrapper .moon-container .star { font-size: 8px; }
    .theme-toggle .icon-wrapper .sun-container .ray { height: 14px; width: 3px; }
    .search-container input { padding: 20px; font-size: 22px; }
    .movie img { height: 300px; }
    .movie h3 { font-size: 22px; }
    .download { font-size: 18px; padding: 8px 25px; }
    h1 { font-size: clamp(2rem, 6vw, 3rem); }
    .rainbow-text { letter-spacing: 1px; }
}
</style>

<script>
// ─── THEME TOGGLE ───
const themeToggle = document.getElementById('themeToggle');

// Check saved theme on page load
function loadTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
        document.body.classList.add('light');
    } else {
        document.body.classList.remove('light');
    }
}

// Save theme when toggled
function toggleTheme() {
    document.body.classList.toggle('light');
    
    if (document.body.classList.contains('light')) {
        localStorage.setItem('theme', 'light');
    } else {
        localStorage.setItem('theme', 'dark');
    }
}

// Load saved theme on page load
loadTheme();

// Add click event with animations
themeToggle.addEventListener('click', function(e) {
    const wrapper = this.querySelector('.icon-wrapper');
    const rect = wrapper.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    
    // Create sparkle particles
    const colors = ['#ffd700', '#ff6b6b', '#00ff88', '#48dbfb', '#ff9ff3', '#feca57'];
    for (let i = 0; i < 12; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        const angle = (i / 12) * Math.PI * 2 + Math.random() * 0.3;
        const distance = 40 + Math.random() * 60;
        const x = centerX + Math.cos(angle) * distance - 10;
        const y = centerY + Math.sin(angle) * distance - 10;
        sparkle.style.left = x + 'px';
        sparkle.style.top = y + 'px';
        sparkle.style.width = (8 + Math.random() * 18) + 'px';
        sparkle.style.height = sparkle.style.width;
        sparkle.style.background = colors[Math.floor(Math.random() * colors.length)];
        sparkle.style.animationDuration = (0.5 + Math.random() * 0.6) + 's';
        sparkle.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
        document.body.appendChild(sparkle);
        
        setTimeout(() => { sparkle.remove(); }, 1200);
    }
    
    // Rotate the wrapper
    wrapper.style.transition = 'transform 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55)';
    wrapper.style.transform = 'rotate(360deg) scale(1.2)';
    
    setTimeout(() => {
        wrapper.style.transform = 'rotate(0deg) scale(1)';
    }, 600);
    
    toggleTheme();
});

for(let i=6; i<=100; i++) {
    movies.push({name:"Hollywood "+i, img:`https://via.placeholder.com/300x450?text=Hollywood+${i}`, link1:"#", link2:"#"});
}

const grid = document.getElementById("movieGrid");
const batchSize = 50;
let currentIndex = 0;

function loadBatch(list = movies) {
    const nextBatch = list.slice(currentIndex, currentIndex + batchSize);
    nextBatch.forEach(m => {
        let box = document.createElement("div");
        box.className = "movie fadeIn";
        box.innerHTML = `
            <img src="${m.img}" alt="${m.name}">
            <h3>${m.name}</h3>
            <a class="download hd" href="${m.link1}" target="_blank">Download HD</a>
            <a class="download sd" href="${m.link2}" target="_blank">Download SD</a>
        `;
        grid.appendChild(box);
        box.addEventListener("touchstart", e => {
            if(!e.target.classList.contains('download')) box.classList.add("active-touch");
        });
        box.addEventListener("touchend", () => setTimeout(() => box.classList.remove("active-touch"), 300));
    });
    currentIndex += batchSize;
}

loadBatch();

window.addEventListener('scroll', () => {
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
        if(currentIndex < movies.length) loadBatch();
    }
});

document.getElementById("searchInput").addEventListener("input", (e) => {
    let q = e.target.value.toLowerCase();
    currentIndex = 0;
    grid.innerHTML = "";
    let filtered = movies.filter(m => m.name.toLowerCase().includes(q));
    loadBatch(filtered);
});
</script>
