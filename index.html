<style>

/* ===== THEME ===== */
:root{
  --bg:#0f172a;
  --card:rgba(255,255,255,0.06);
  --text:#fff;
  --green:#22c55e;
}

body.light{
  --bg:#f1f5f9;
  --card:#fff;
  --text:#111827;
  --green:#16a34a;
}

body{
  margin:0;
  font-family:'Noto Nastaliq Urdu', serif;
  background:var(--bg);
  color:var(--text);
}

/* TITLE */
.title{
  position:absolute;
  left:50%;
  top:5%;
  transform:translate(-50%,-50%);
  
  font-size:27px;
  font-weight:900;
  font-family:'Poppins',sans-serif;
  letter-spacing:3px;
  text-transform:uppercase;

  color:#ff0000;

  animation: horrorFlicker 0.2s infinite,
             horrorShake 1.5s infinite,
             floatText 3s ease-in-out infinite;

  text-shadow:
    2px 0 #ff0000,
    -2px 0 #000,
    0 0 10px #ff0000,
    0 0 25px rgba(255,0,0,0.6);
}

/* 💀 Flicker (broken signal feel) */
@keyframes horrorFlicker{
  0%{ opacity:1; }
  10%{ opacity:0.7; }
  20%{ opacity:1; }
  30%{ opacity:0.4; }
  40%{ opacity:1; }
  60%{ opacity:0.6; }
  80%{ opacity:1; }
  100%{ opacity:0.8; }
}

/* 💀 Shake (fear effect) */
@keyframes horrorShake{
  0%,100%{ transform:translate(-50%,-50%) translate(0,0); }
  20%{ transform:translate(-50%,-50%) translate(-3px,2px); }
  40%{ transform:translate(-50%,-50%) translate(3px,-2px); }
  60%{ transform:translate(-50%,-50%) translate(-2px,-3px); }
  80%{ transform:translate(-50%,-50%) translate(2px,3px); }
}

/* Floating */
@keyframes floatText{
  0%,100%{ transform:translate(-50%,-50%) translateY(0); }
  50%{ transform:translate(-50%,-50%) translateY(-4px); }
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px 15px;
}

#menuBtn{
  font-size:25px;
  background:none;
  border:none;
  color:var(--green);
  cursor:pointer;
}

/* SEARCH */
#search{
  width:80%;
  margin:55px auto;
  padding:12px;
  border-radius:10px;
  border:none;
  display:block;
  text-align:center;
  font-weight:800;
}

/* CARD */
.card{
  margin:15px;
  padding:15px;
  border-radius:15px;
  background:var(--card);
  border:1px solid rgba(34,197,94,0.3);
  position:relative;
}

.text{
  margin-top:40px;
  font-size:14px;
  line-height:2;
}

/* ACTION */
.actionBox{
  position:absolute;
  top:10px;
  left:10px;
  display:flex;
  gap:12px;
}

.actionBox button{
  background:none;
  border:none;
  font-size:18px;
  cursor:pointer;
  color:var(--text);
}

/* HEART */
.like i{
  color:transparent;
  -webkit-text-stroke:1.6px var(--text);
}

.like.liked i{
  color:red;
  -webkit-text-stroke:0;
}

/* DRAWER */
.drawer{
  position:fixed;
  top:0;
  right:0;
  width:150px;
  height:85%;
  background:#111827;
  border-radius:35px 0 0 35px;
  transform:translateX(100%);
  transition:0.35s;
  padding-top:60px;
  z-index:999;
}

.drawer.open{
  transform:translateX(0);
}

#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
}

#overlay.show{
  display:block;
}

/* CLOSE */
#closeBtn{
  position:absolute;
  top:10px;
  left:10px;
  background:none;
  border:none;
  color:var(--green);
  font-size:22px;
  cursor:pointer;
}

/* MENU */
.menuItem{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  color:var(--green);
  cursor:pointer;
  text-decoration:none;
}

/* CATEGORY */
.categoryBox{
  display:none;
  padding-right:10px;
}

.categoryBox.show{
  display:block;
}

.categoryItem{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  color:var(--green);
  text-decoration:none;
  border-right:3px solid var(--green);
  margin:6px 0;
  font-size:14px;
}

.categoryItem:hover{
  background:rgba(34,197,94,0.1);
  transform:translateX(-3px);
}

/* LOAD */
#loadMore{
  margin:20px auto;
  display:block;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:var(--green);
  color:#000;
  font-weight:800;
}

/* ICON */
.icon-spin{
  animation:spin 0.4s linear;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

</style>

const autoQuotes=Array.from({length:600},(_,i)=>({
id:i+100,
category:i%3===0?"urdu":i%3===1?"pashto":"islamic",
show:"یہ قول نمبر "+(i+1),
copy:"text "+(i+1)
}));

const quotes=[...customQuotes,...autoQuotes];

let favorites=JSON.parse(localStorage.getItem("favs"))||[];
let filtered=[...quotes];
let page=1;
let limit=20;

/* DRAWER */
function openDrawer(){
drawer.classList.add("open");
overlay.classList.add("show");
}

function closeDrawer(){
drawer.classList.remove("open");
overlay.classList.remove("show");
}

/* CATEGORY */
function toggleCategories(){
document.getElementById("categoryBox").classList.toggle("show");
}

/* FILTER */
function showAll(){
filtered=[...quotes];
page=1;
render();
closeDrawer();
}

function showFavs(){
filtered=quotes.filter(q=>favorites.includes(q.id));
page=1;
render();
closeDrawer();
}

/* LIKE */
function toggleLike(id){
if(favorites.includes(id)){
favorites=favorites.filter(f=>f!==id);
}else{
favorites.push(id);
}
localStorage.setItem("favs",JSON.stringify(favorites));
render();
}

/* SEARCH */
function searchQuotes(){
let v=document.getElementById("search").value.toLowerCase();
filtered=quotes.filter(q=>q.show.toLowerCase().includes(v));
page=1;
render();
}

/* LOAD */
function loadMore(){
page++;
render();
}

/* NIGHT MODE */
function toggleTheme(){
const icon=document.getElementById("themeIcon");

icon.classList.add("icon-spin");
setTimeout(()=>icon.classList.remove("icon-spin"),400);

document.body.classList.toggle("light");

if(document.body.classList.contains("light")){
localStorage.setItem("theme","light");
icon.classList.replace("fa-moon","fa-sun");
}else{
localStorage.setItem("theme","dark");
icon.classList.replace("fa-sun","fa-moon");
}
}

/* RENDER */
function render(){
let c=document.getElementById("container");
c.innerHTML="";

filtered.slice(0,page*limit).forEach(q=>{
let liked=favorites.includes(q.id);

c.innerHTML+=`
<div class="card">

<div class="actionBox">

<button class="like ${liked?'liked':''}" onclick="toggleLike(${q.id})">
<i class="fas fa-heart"></i>
</button>

<button onclick="navigator.clipboard.writeText('${q.copy}')">
<i class="fas fa-copy"></i>
</button>

</div>

<div class="text">${q.show}</div>

</div>`;
});
}

render();
